name: Docker Multi-Arch Build

on:
  workflow_run:
    workflows: ["Release (Create Tag)"]
    types:
      - completed

jobs:
  docker:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Resolve release tag
        id: tag
        run: |
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No release tag found"
            exit 1
          fi
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT

      - name: Ensure tag is on main
        run: |
          git branch --contains "refs/tags/${{ steps.tag.outputs.VERSION }}" | grep "main" \
            || (echo "Tag is not on main branch" && exit 1)

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE }}:${{ steps.tag.outputs.VERSION }}
            ${{ vars.DOCKER_IMAGE }}:latest
